name: OpenMortal multi-platform build & release

on:
  push:
    branches: [ upgrade ]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [ upgrade ]
  workflow_dispatch:

env:
  APPIMAGE_EXTRACT_AND_RUN: 1
  DIST_FOLDER: ${{ github.workspace }}/distribution

jobs:
  linux-x86-64_build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04
    env:
      DEBIAN_FRONTEND: noninteractive
      OSNAME: linux-ubuntu-noble
      PLATFORM: x86-64

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from configure.ac
        run: echo "VERSION=$(grep -m1 'AC_INIT' configure.ac | grep -oP '\d+\.\d+\.\d+')" >> $GITHUB_ENV

      - name: Define paths
        run: |
          echo "PLATFORM_BUILD_PATH=${DIST_FOLDER}/linux-${PLATFORM}_build" >> $GITHUB_ENV
          echo "PLATFORM_PACKAGE_PATH=${DIST_FOLDER}/linux-${PLATFORM}_package" >> $GITHUB_ENV
          echo "PLATFORM_APPIMAGE_PATH=${DIST_FOLDER}/AppDir" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          set -e
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            wget build-essential autoconf automake libtool pkg-config \
            dh-autoreconf debhelper devscripts fakeroot \
            libperl-dev libsdl1.2-dev libsdl-image1.2-dev \
            libsdl-mixer1.2-dev libsdl-net1.2-dev libfreetype6-dev libgif-dev

      - name: Build from source
        run: |
          set -e
          autoreconf -i -f
          ./configure --prefix=/usr
          make -j$(nproc)

      - name: Create distributable archive
        run: make dist

      - name: Install binary files
        run: make DESTDIR="${{ env.PLATFORM_BUILD_PATH }}/" install

      - name: Prepare AppImage environment
        run: |
          set -e
          mkdir -p ${{ env.PLATFORM_APPIMAGE_PATH }}/usr/bin
          mkdir -p ${{ env.PLATFORM_APPIMAGE_PATH }}/usr/share/icons/hicolor/32x32/apps
          install -m644 data/gfx/icon.png ${{ env.PLATFORM_APPIMAGE_PATH }}/usr/share/icons/hicolor/32x32/apps/openmortal.png
          mkdir -p ${{ env.PLATFORM_APPIMAGE_PATH }}/usr/share/openmortal
          cp -a ${{ env.PLATFORM_BUILD_PATH }}/usr/share ${{ env.PLATFORM_APPIMAGE_PATH }}/usr/
          install -m644 packaging/openmortal.AppImage.desktop ${{ env.PLATFORM_APPIMAGE_PATH }}/openmortal.desktop
          install -m755 ${{ env.PLATFORM_BUILD_PATH }}/usr/bin/openmortal ${{ env.PLATFORM_APPIMAGE_PATH }}/usr/bin/openmortal
          mkdir -p ${{ env.PLATFORM_PACKAGE_PATH }}/usr/bin
          mkdir -p ${{ env.PLATFORM_PACKAGE_PATH }}/usr/share/openmortal
          cp -a ${{ env.PLATFORM_BUILD_PATH }}/usr/share ${{ env.PLATFORM_PACKAGE_PATH }}/usr/
          install -m755 ${{ env.PLATFORM_BUILD_PATH }}/usr/bin/openmortal ${{ env.PLATFORM_PACKAGE_PATH }}/usr/bin/openmortal
          tar zcvf openmortal-${{ env.VERSION }}_linux_${{ env.PLATFORM }}.tar.gz -C ${{ env.PLATFORM_PACKAGE_PATH }} .

      - name: Download linuxdeploy and appimagetool
        run: |
          wget -qO /tmp/linuxdeploy-x86_64.AppImage "https://github.com/linuxdeploy/linuxdeploy/releases/latest/download/linuxdeploy-x86_64.AppImage"
          chmod +x /tmp/linuxdeploy-x86_64.AppImage
          wget -qO /tmp/appimagetool.AppImage "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x /tmp/appimagetool.AppImage

      - name: Create AppImage
        run: |
          /tmp/linuxdeploy-x86_64.AppImage \
            --appdir ${{ env.PLATFORM_APPIMAGE_PATH }} \
            --desktop-file=${{ env.PLATFORM_APPIMAGE_PATH }}/openmortal.desktop \
            --icon-file=${{ env.PLATFORM_APPIMAGE_PATH }}/usr/share/icons/hicolor/32x32/apps/openmortal.png
          /tmp/appimagetool.AppImage ${{ env.PLATFORM_APPIMAGE_PATH }}

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: openmortal_appimage_${{ env.PLATFORM }}
          path: ./*.AppImage

      - name: Upload Linux source gzip archive
        uses: actions/upload-artifact@v4
        with:
          name: openmortal-${{ env.VERSION }}.tar.gz
          path: ./openmortal-${{ env.VERSION }}.tar.gz

      - name: Upload Linux binary gzip archive
        uses: actions/upload-artifact@v4
        with:
          name: openmortal-${{ env.VERSION }}_linux_${{ env.PLATFORM }}.tar.gz
          path: ./openmortal-${{ env.VERSION }}_linux_${{ env.PLATFORM }}.tar.gz

  linux-x86-64_build-debian:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04
    env:
      DEBIAN_FRONTEND: noninteractive
      OSNAME: linux-ubuntu-noble
      PLATFORM: x86-64

    steps:
      - uses: actions/checkout@v4

      - name: Define paths
        run: |
          echo "PLATFORM_BUILD_PATH=${DIST_FOLDER}/linux-${PLATFORM}_build" >> $GITHUB_ENV
          echo "PLATFORM_PACKAGE_PATH=${DIST_FOLDER}/linux-${PLATFORM}_package" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          set -e
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            build-essential autoconf automake libtool pkg-config \
            dh-autoreconf debhelper devscripts fakeroot \
            libperl-dev libsdl1.2-dev libsdl-image1.2-dev \
            libsdl-mixer1.2-dev libsdl-net1.2-dev libfreetype6-dev libgif-dev

      - name: Build debian package
        run: |
          set -e
          dpkg-buildpackage -us -uc
          mkdir -p $GITHUB_WORKSPACE/build
          cp -rv ../*.deb $GITHUB_WORKSPACE/build/

      - name: Upload Linux debian binary packages
        uses: actions/upload-artifact@v4
        with:
          name: openmortal_debian_package
          path: build/openmortal_*.deb

      - name: Upload Linux debian data packages
        uses: actions/upload-artifact@v4
        with:
          name: openmortal_debian_data_package
          path: build/openmortal-data_*.deb

  linux-x86-64_build-local:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04
    env:
      DEBIAN_FRONTEND: noninteractive
      OSNAME: linux-ubuntu-noble
      PLATFORM: x86-64

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from configure.ac
        run: echo "VERSION=$(grep -m1 'AC_INIT' configure.ac | grep -oP '\d+\.\d+\.\d+')" >> $GITHUB_ENV

      - name: Define paths
        run: |
          echo "PLATFORM_BUILD_PATH=${DIST_FOLDER}/linux-${PLATFORM}_build" >> $GITHUB_ENV
          echo "PLATFORM_PACKAGE_PATH=${DIST_FOLDER}/linux-${PLATFORM}_package" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          set -e
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            build-essential autoconf automake libtool pkg-config \
            dh-autoreconf debhelper devscripts fakeroot \
            libperl-dev libsdl1.2-dev libsdl-image1.2-dev \
            libsdl-mixer1.2-dev libsdl-net1.2-dev libfreetype6-dev libgif-dev

      - name: Build from source
        run: |
          set -e
          autoreconf -i -f
          ./configure
          make -j$(nproc)

      - name: Create distributable archive
        run: make dist

      - name: Install binary files
        run: make DESTDIR="${{ env.PLATFORM_BUILD_PATH }}/" install

      - name: Package /usr/local layout
        run: |
          set -e
          mkdir -p ${{ env.PLATFORM_PACKAGE_PATH }}/usr/local/bin
          mkdir -p ${{ env.PLATFORM_PACKAGE_PATH }}/usr/local/share/openmortal
          cp -a ${{ env.PLATFORM_BUILD_PATH }}/usr/local/share ${{ env.PLATFORM_PACKAGE_PATH }}/usr/local/
          install -m755 ${{ env.PLATFORM_BUILD_PATH }}/usr/local/bin/openmortal ${{ env.PLATFORM_PACKAGE_PATH }}/usr/local/bin/openmortal
          tar zcvf openmortal-${{ env.VERSION }}_linux_${{ env.PLATFORM }}-local.tar.gz -C ${{ env.PLATFORM_PACKAGE_PATH }} .

      - name: Upload Linux binary (/usr/local) gzip archive
        uses: actions/upload-artifact@v4
        with:
          name: openmortal-${{ env.VERSION }}_linux_${{ env.PLATFORM }}-local.tar.gz
          path: ./openmortal-${{ env.VERSION }}_linux_${{ env.PLATFORM }}-local.tar.gz

  linux-distro-build:
    name: Linux Build (${{ matrix.DISTRO }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Debian stable / testing
          - { DISTRO: debian-bookworm, IMAGE: "debian:12",          PKG_MGR: apt,      EXPERIMENTAL: false }
          - { DISTRO: debian-bullseye, IMAGE: "debian:11",          PKG_MGR: apt,      EXPERIMENTAL: false }
          - { DISTRO: debian-trixie,   IMAGE: "debian:13",          PKG_MGR: apt,      EXPERIMENTAL: true  }
          # Ubuntu LTS
          - { DISTRO: ubuntu-noble,    IMAGE: "ubuntu:24.04",       PKG_MGR: apt,      EXPERIMENTAL: false }
          - { DISTRO: ubuntu-jammy,    IMAGE: "ubuntu:22.04",       PKG_MGR: apt,      EXPERIMENTAL: false }
          - { DISTRO: ubuntu-focal,    IMAGE: "ubuntu:20.04",       PKG_MGR: apt,      EXPERIMENTAL: false }
          # Fedora (rolling ESR)
          - { DISTRO: fedora-41,       IMAGE: "fedora:41",          PKG_MGR: dnf,      EXPERIMENTAL: true  }
          - { DISTRO: fedora-40,       IMAGE: "fedora:40",          PKG_MGR: dnf,      EXPERIMENTAL: true  }
          # Enterprise Linux (RHEL-compatible)
          - { DISTRO: almalinux-9,     IMAGE: "almalinux:9",        PKG_MGR: dnf_el9,  EXPERIMENTAL: true  }
          - { DISTRO: almalinux-8,     IMAGE: "almalinux:8",        PKG_MGR: dnf_el8,  EXPERIMENTAL: true  }
          # openSUSE Leap
          - { DISTRO: opensuse-leap,   IMAGE: "opensuse/leap:15.6", PKG_MGR: zypper,   EXPERIMENTAL: true  }
          # Arch Linux (rolling)
          - { DISTRO: archlinux,       IMAGE: "archlinux:latest",   PKG_MGR: pacman,   EXPERIMENTAL: true  }
          # Alpine Linux
          - { DISTRO: alpine-3.20,     IMAGE: "alpine:3.20",        PKG_MGR: apk,      EXPERIMENTAL: true  }
          - { DISTRO: alpine-3.19,     IMAGE: "alpine:3.19",        PKG_MGR: apk,      EXPERIMENTAL: true  }
    continue-on-error: ${{ matrix.EXPERIMENTAL }}
    container:
      image: ${{ matrix.IMAGE }}

    steps:
      - name: Install git
        run: |
          if   command -v apt-get >/dev/null 2>&1; then apt-get update -qq && apt-get install -y --no-install-recommends git ca-certificates
          elif command -v dnf     >/dev/null 2>&1; then dnf install -y git
          elif command -v zypper  >/dev/null 2>&1; then zypper --non-interactive install git; rc=$?; [ $rc -eq 0 ] || [ $rc -eq 106 ]
          elif command -v pacman  >/dev/null 2>&1; then pacman -Sy --noconfirm git
          elif command -v apk     >/dev/null 2>&1; then apk add --no-cache git
          fi

      - uses: actions/checkout@v4

      - name: Install build dependencies (apt)
        if: matrix.PKG_MGR == 'apt'
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -e
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            build-essential autoconf automake libtool pkg-config \
            libperl-dev libsdl1.2-dev libsdl-image1.2-dev \
            libsdl-mixer1.2-dev libsdl-net1.2-dev libfreetype6-dev libgif-dev

      - name: Install build dependencies (dnf - Fedora)
        if: matrix.PKG_MGR == 'dnf'
        run: |
          set -e
          dnf install -y \
            gcc gcc-c++ make autoconf automake libtool pkgconf-pkg-config \
            perl-devel SDL-devel SDL_image-devel SDL_mixer-devel SDL_net-devel \
            freetype-devel giflib-devel

      - name: Install build dependencies (dnf - Enterprise Linux 9)
        if: matrix.PKG_MGR == 'dnf_el9'
        run: |
          set -e
          dnf install -y dnf-plugins-core epel-release
          dnf config-manager --set-enabled crb
          dnf install -y "https://mirrors.rpmfusion.org/free/el/rpmfusion-free-release-$(rpm -E %rhel).noarch.rpm"
          dnf install -y \
            gcc gcc-c++ make autoconf automake libtool pkgconf-pkg-config \
            perl-devel SDL-devel SDL_image-devel SDL_mixer-devel SDL_net-devel \
            freetype-devel giflib-devel

      - name: Install build dependencies (dnf - Enterprise Linux 8)
        if: matrix.PKG_MGR == 'dnf_el8'
        run: |
          set -e
          dnf install -y dnf-plugins-core epel-release
          dnf config-manager --set-enabled powertools
          dnf install -y "https://mirrors.rpmfusion.org/free/el/rpmfusion-free-release-$(rpm -E %rhel).noarch.rpm"
          dnf install -y \
            gcc gcc-c++ make autoconf automake libtool pkgconf-pkg-config \
            perl-devel SDL-devel SDL_image-devel SDL_mixer-devel SDL_net-devel \
            freetype-devel giflib-devel

      - name: Install build dependencies (zypper - openSUSE)
        if: matrix.PKG_MGR == 'zypper'
        run: |
          set -e
          zypper --non-interactive refresh
          zypper --non-interactive install \
            gcc gcc-c++ make autoconf automake libtool pkg-config \
            perl-devel libSDL-devel libSDL_image-devel libSDL_mixer-devel libSDL_net-devel \
            freetype2-devel giflib-devel

      - name: Install build dependencies (pacman - Arch)
        if: matrix.PKG_MGR == 'pacman'
        run: |
          set -e
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            base-devel autoconf automake libtool pkgconf \
            perl sdl sdl_image sdl_mixer sdl_net freetype2 giflib

      - name: Install build dependencies (apk - Alpine)
        if: matrix.PKG_MGR == 'apk'
        run: |
          set -e
          apk add --no-cache \
            build-base autoconf automake libtool pkgconf bash \
            perl-dev sdl-dev sdl_image-dev sdl_mixer-dev sdl_net-dev freetype-dev giflib-dev

      - name: Build from source
        run: |
          set -e
          autoreconf -i -f
          ./configure
          make -j$(nproc)

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: openmortal_${{ matrix.DISTRO }}
          path: src/openmortal
